name: Prime number
on:
  workflow_dispatch: 
    inputs:
      number:
        description: "enter a number"
        required: true
        default: 20
jobs:
  check-prime:
    runs-on: ubuntu-latest
    steps:
        - name: checkout repository
          uses: actions/checkout@v3
        - name: setup Python
          uses: actions/setup-python@v4
        - name: Run python script
          run: python temp.py ${{github.event.inputs.number}} 
    
